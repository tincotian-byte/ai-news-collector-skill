        .custom-range .sep { font-size: 13px; color: var(--text-muted); }

        .trend-highlight { background: linear-gradient(120deg, #fff3cd 0%, #ffeeba 100%); padding: 1px 5px; border-radius: 3px; color: var(--text); font-weight: 600; }
        .trends-empty { font-size: 13px; color: var(--text-muted); padding: 16px; text-align: center; background: var(--bg); border-radius: 8px; }

        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-value { font-weight: 700; color: var(--primary); font-size: 16px; }

        /* ===== Main Layout ===== */

        .filter-title { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 4px 0; }

// ---------- Time Range ----------

function getDateRange(range) {
    const today = new Date();
    today.setHours(23, 59, 59, 999);
    let start = new Date(today);
    switch (range) {
        case 'today':  start.setHours(0,0,0,0); break;
        case 'week':   start.setDate(start.getDate() - 7); start.setHours(0,0,0,0); break;
        case 'month':  start.setMonth(start.getMonth() - 1); start.setHours(0,0,0,0); break;
        case 'year':   start.setFullYear(start.getFullYear() - 1); start.setHours(0,0,0,0); break;
        default:       start = new Date('2020-01-01');
    }
    return { start: fmt(start), end: fmt(today) };
}

function fmt(d) { return d.toISOString().split('T')[0]; }

function setTimeRange(range, btn) {
    document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const cr = document.getElementById('custom-range');
    if (range === 'custom') {
        cr.classList.add('visible');
        return;
    }
    cr.classList.remove('visible');
    const { start, end } = getDateRange(range);
    applyTimeFilter(start, end);
}

function applyCustomRange() {
    const s = document.getElementById('custom-start').value;
    const e = document.getElementById('custom-end').value;
    if (s && e) applyTimeFilter(s, e);
}

function applyTimeFilter(startDate, endDate) {
    // 按实际发布时间 (time) 筛选
    timeFiltered = NEWS_DATA.filter(n => n.time >= startDate && n.time <= endDate);

    // 清空侧栏筛选
    clearSidebarFiltersUI();

    // 更新趋势：找出在当前时间范围内有资讯的采集批次，聚合其趋势
    updateTrends(startDate, endDate);

    // 更新统计
    updateStats(timeFiltered);

    // 重建侧栏
    rebuildSidebar(timeFiltered);

    // 渲染资讯
    renderNews(timeFiltered);
}

// ---------- Trends ----------

function updateTrends(startDate, endDate) {
    const list = document.getElementById('trends-list');
    const collected = [];

    for (const [collDate, trends] of Object.entries(TRENDS_DATA)) {
        const hasMatch = NEWS_DATA.some(n => n.date === collDate && n.time >= startDate && n.time <= endDate);
        if (hasMatch) trends.forEach(t => collected.push({ date: collDate, text: t }));
    }

    if (!collected.length) {
        list.innerHTML = '<div class="trends-empty">当前时间范围内暂无趋势总结</div>';
        return;
    }

    // 按采集日期倒序，取前4条
    collected.sort((a, b) => b.date.localeCompare(a.date));
    const top = collected.slice(0, 4);
    list.innerHTML = top.map((t, i) => `<div class="trend-item"><strong>${i + 1}.</strong> ${t.text}</div>`).join('');
}

// ---------- Stats ----------

function updateStats(news) {
    document.getElementById('stat-total').textContent = news.length;
    document.getElementById('stat-dates').textContent = new Set(news.map(n => n.date)).size;
    document.getElementById('stat-companies').textContent = new Set(news.map(n => n.company)).size;
    document.getElementById('stat-high').textContent = news.filter(n => n.priority === 'high').length;
}

// ---------- Sidebar ----------

function rebuildSidebar(baseList) {
    buildFilterGroup('company-filters', baseList, 'company');
    buildFilterGroup('field-filters', baseList, 'field');
    buildPriorityGroup(baseList);
}

function buildFilterGroup(containerId, list, key) {
    const counts = {};
    list.forEach(n => counts[n[key]] = (counts[n[key]] || 0) + 1);
    const el = document.getElementById(containerId);
    el.innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([name, count]) =>
            `<label class="filter-item">
                <input type="checkbox" value="${name}" onchange="applyFilters()">
                <span class="label">${name}</span>
                <span class="count">${count}</span>
            </label>`
        ).join('');
}

function buildPriorityGroup(list) {
    const counts = { high: 0, medium: 0, low: 0 };
    list.forEach(n => { if (counts[n.priority] !== undefined) counts[n.priority]++; });
    const labels = { high: '高优先级', medium: '中优先级', low: '低优先级' };
    const el = document.getElementById('priority-filters');
    el.innerHTML = Object.entries(labels).map(([val, label]) =>
        `<label class="filter-item${counts[val] === 0 ? ' dimmed' : ''}">
            <input type="checkbox" value="${val}" onchange="applyFilters()"${counts[val] === 0 ? ' disabled' : ''}>
            <span class="label">${label}</span>
            <span class="count">${counts[val]}</span>
        </label>`
    ).join('');
}

// ---------- Faceted Filter ----------

function getChecked(sel) {
    return Array.from(document.querySelectorAll(sel + ' input:checked')).map(cb => cb.value);
}

function applyFilters() {
    const sc = getChecked('#company-filters');
    const sf = getChecked('#field-filters');
    const sp = getChecked('#priority-filters');

    const filtered = timeFiltered.filter(n => {
        if (sc.length && !sc.includes(n.company)) return false;
        if (sf.length && !sf.includes(n.field)) return false;
        if (sp.length && !sp.includes(n.priority)) return false;
        return true;
    });

    // 更新各分面计数（每个维度的计数不受自身选中项影响，只受其他维度限制）
    updateFacetCounts(sc, sf, sp);

    renderNews(filtered);
}

function updateFacetCounts(sc, sf, sp) {
    // 厂商计数：受 field + priority 限制
    const companyBase = timeFiltered.filter(n =>
        (!sf.length || sf.includes(n.field)) &&
        (!sp.length || sp.includes(n.priority))
    );
    updateCountsInContainer('company-filters', companyBase, 'company');

    // 领域计数：受 company + priority 限制
    const fieldBase = timeFiltered.filter(n =>
        (!sc.length || sc.includes(n.company)) &&
        (!sp.length || sp.includes(n.priority))
    );
    updateCountsInContainer('field-filters', fieldBase, 'field');

    // 优先级计数：受 company + field 限制
    const prioBase = timeFiltered.filter(n =>
        (!sc.length || sc.includes(n.company)) &&
        (!sf.length || sf.includes(n.field))
    );
    const prioCounts = { high: 0, medium: 0, low: 0 };
    prioBase.forEach(n => { if (prioCounts[n.priority] !== undefined) prioCounts[n.priority]++; });
    document.querySelectorAll('#priority-filters .filter-item').forEach(item => {
        const val = item.querySelector('input').value;
        const checked = item.querySelector('input').checked;
        const c = prioCounts[val] || 0;
        item.querySelector('.count').textContent = c;
        item.classList.toggle('dimmed', !checked && c === 0);
        item.querySelector('input').disabled = (!checked && c === 0);
    });
}

function updateCountsInContainer(containerId, list, key) {
    const counts = {};
    list.forEach(n => counts[n[key]] = (counts[n[key]] || 0) + 1);
    document.querySelectorAll('#' + containerId + ' .filter-item').forEach(item => {
        const val = item.querySelector('input').value;
        const checked = item.querySelector('input').checked;
        const c = counts[val] || 0;
        item.querySelector('.count').textContent = c;
        item.classList.toggle('dimmed', !checked && c === 0);
        item.querySelector('input').disabled = (!checked && c === 0);
    });
}

function clearSidebarFiltersUI() {
    document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(cb => { cb.checked = false; cb.disabled = false; });
    document.querySelectorAll('.sidebar .filter-item').forEach(el => el.classList.remove('dimmed'));
}

function clearSidebarFilters() {
    clearSidebarFiltersUI();
    rebuildSidebar(timeFiltered);
    renderNews(timeFiltered);
}

function toggleFilter(title) {
    title.classList.toggle('collapsed');
    const c = title.nextElementSibling;
    if (c) c.classList.toggle('collapsed');
}

// ---------- View ----------

function setView(mode, btn) {
    currentView = mode;
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const c = document.getElementById('news-container');
    c.classList.remove('full', 'compact');
    c.classList.add(mode);
}

// ---------- Render ----------

function renderNews(list) {
    const container = document.getElementById('news-container');
    document.getElementById('filtered-count').textContent = list.length;

    if (!list.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>当前筛选条件下没有资讯</p></div>';
        return;
    }

    // 按采集日期分组
    const grouped = {};
    list.forEach(n => { if (!grouped[n.date]) grouped[n.date] = []; grouped[n.date].push(n); });
    const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

    container.innerHTML = dates.map(date => `
        <div class="date-group">
            <div class="date-header">${date} 采集</div>
            ${grouped[date]
                .sort((a, b) => { const po = {high:0,medium:1,low:2}; return (po[a.priority]||1) - (po[b.priority]||1) || b.time.localeCompare(a.time); })
                .map(n => `
                <article class="news-card">
                    <h3 class="news-title">
                        <span class="priority priority-${n.priority}">${({high:'高',medium:'中',low:'低'})[n.priority]}</span>
                        ${n.title}
                    </h3>
                    <div class="news-meta">
                        <span>${n.time}</span>
                        <span>${n.company}</span>
                        <span>${n.field}</span>
                        <a href="${n.sourceUrl}" target="_blank">${n.source} ↗</a>
                    </div>
                    <p class="news-summary">${n.summary}</p>
                    ${n.points.length ? `<ul class="news-points">${n.points.map(p => `<li>${p}</li>`).join('')}</ul>` : ''}
                </article>
            `).join('')}
        </div>
    `).join('');

    container.classList.add(currentView);
}
</script>
